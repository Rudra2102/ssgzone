events {
    worker_connections 1024;
}

http {
    upstream api_gateway {
        server api-gateway:4000;
    }

    upstream admin_portal {
        server admin-portal:80;
    }

    upstream webmail_client {
        server webmail-client:80;
    }

    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name *.ssghub.com;
        return 301 https://$server_name$request_uri;
    }

    # API Gateway
    server {
        listen 443 ssl http2;
        server_name api.ssghub.com;

        ssl_certificate /etc/ssl/certs/ssghub.com.crt;
        ssl_certificate_key /etc/ssl/private/ssghub.com.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512;

        location / {
            proxy_pass http://api_gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Admin Portal
    server {
        listen 443 ssl http2;
        server_name admin.ssghub.com;

        ssl_certificate /etc/ssl/certs/ssghub.com.crt;
        ssl_certificate_key /etc/ssl/private/ssghub.com.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        location / {
            proxy_pass http://admin_portal;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Webmail Client
    server {
        listen 443 ssl http2;
        server_name mail.ssghub.com;

        ssl_certificate /etc/ssl/certs/ssghub.com.crt;
        ssl_certificate_key /etc/ssl/private/ssghub.com.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        location / {
            proxy_pass http://webmail_client;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}